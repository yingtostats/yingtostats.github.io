# main text of home
name: Ying Zhang
bio: Ride with Uncertainties.
# twitter summary info
description: Data-Scientist-to-be

# if it's an external image, update below for true
# better with square images
external-image: false
picture: assets/images/profile.jpg

url: https://yingtostats.github.io
# your url: http://USERNAME.github.io
#paginate: 5
#paginate_path:  "/page:num/"
#excerpt: '<br>'
permalink: /:title/

markdown: kramdown
highlighter: rouge

# To enable google analytics, supply your token below
analytics-google: 'UA-130961615-1'

# To enable piwik tracking, supply your url & site ID below
# analytics-piwik-url: 'piwik.my-host.com'
# analytics-piwik-id: 1

# if you don't want comments in your posts, set to false
disqus: yingsight

# if you don't have any of social below, comment the line
# facebook: your_facebook_id
# twitter: your_twitter
# google: mygoogle
# instagram: your_instagram
# pinterest: mypinterest
linkedin: yingsight
#youtube: myyoutube
#spotify: myspotify
# github: your_github
#stackoverflow: 7044681/mystackoverflow
#quora: userquora
#reddit: username
#medium: medium
#vimeo: myvimeo
email: yingstatpsu@gmail.com

authors:
  YingZhang:
    name: Ying Zhang
    bio: Ride with Uncertainties.
    external-image: false
    picture: assets/images/profile.jpg
    website: https://yingtostats.github.io/about/
  WenboGuo:
    name: Wenbo Guo
    bio: Researcher in ML and LLMs.
    external-image: true
    picture: https://henrygwb.github.io/Wenbo_files/WENBO.JPG
    website: https://henrygwb.github.io
    # twitter: your_twitter
# do you want a larger site? change the option below
# options: [normal, large] | default: normal
# normal = 560px / large = 810px
width: large

# if you don't need pagination, comment the *paginate* configs below
# paginate: 5
# paginate_path: "blog/:num/"

# if you don't need projects, comment the *projects* configs below
projects: false

# if you don't need "about" or "blog", comment them out below
about: true
blog: true

# do you want to show the "read time" of the posts?
read-time: true

# do you want to show the "tags" inside the posts?
show-tags: true

# related posts inside a post?
related: true

# show next & prev links in blog post?
blog-nav-links: true

# show author block at the end of a post ?
show-author: true

# do you want some animations?
animation: true

sass:
    sass_dir: _sass
    style: :compressed

plugins:
  - jemoji
  - jekyll-mentions
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-paginate

jekyll-mentions:
   base_url: https://yingtostats.github.io
